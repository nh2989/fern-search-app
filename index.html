<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本産しだ主要属検索表</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="しだ検索">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="icon-192.png">
    <!-- スタイルシート -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 日本産しだ主要属検索表</h1>
            <p>光田重幸『しだの図鑑』より（北海道〜九州本土・26属収録）</p>
        </div>

        <div class="content">
            <div id="breadcrumb" class="breadcrumb" style="display:none;"></div>
            <div id="main-content">
                <!-- 初期画面: 属選択 -->
                <div id="genus-selection">
                    <div class="intro-text">
                        <h3>📚 検索の流れ</h3>
                        <p>まず属を選択してください。各属の代表的な種を参考に、観察した植物に近いものを選びます。</p>
                        <p style="margin-top: 10px;"><strong>実装状況:</strong> 全26属中7属（約135種）が検索可能です。<span style="color: #4caf50; font-weight: bold;">●実装済</span>のバッジがついている属を選択してください。</p>
                        <p style="margin-top: 10px; font-size: 0.85em; color: #666;">
                            💡 属カードをタップして代表種を確認し、「タップして検索を開始」ボタンで検索スタート
                        </p>
                    </div>
                    <div id="genus-grid" class="genus-grid"></div>
                </div>

                <!-- 検索画面 -->
                <div id="search-area" style="display:none;">
                    <div id="question-area"></div>
                    <div id="options-area" class="options"></div>
                    <div id="result-area"></div>
                </div>
            </div>

            <div class="controls">
                <button id="back-btn" class="btn btn-back" style="display:none;">⬅ 戻る</button>
                <button id="reset-btn" class="btn btn-reset" style="display:none;">🔄 最初から</button>
            </div>
        </div>
    </div>

    <!-- 属一覧は最初から読み込む -->
    <script src="data/genera.js"></script>
    <!-- メインスクリプト -->
    <script src="app.js"></script>
</body>
</html>
